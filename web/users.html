<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ИБ — Пользователи</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <a class="brand" href="index.html">🔒 ИБ-Система</a>
    <ul>
        <li><a href="index.html">Дашборд</a></li>
        <li><a href="incidents.html">Инциденты</a></li>
        <li><a href="resources.html">Ресурсы</a></li>
        <li><a href="users.html" class="active">Пользователи</a></li>
    </ul>
</nav>
<div class="container">
    <div class="page-header">
        <h1>Пользователи системы</h1>
        <a href="users_add.html" class="btn btn-primary">+ Добавить пользователя</a>
    </div>
    <div class="table-wrapper">
        <table>
            <thead>
                <tr><th>#</th><th>ФИО</th><th>Должность</th><th>Отдел</th><th>Уровень доступа</th><th>Смена пароля</th><th>Действия</th></tr>
            </thead>
            <tbody id="users-body">
                <tr><td colspan="7" style="text-align:center;color:#999;">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>
</div>
<footer>© 2026 Система управления информационной безопасностью предприятия</footer>
<script>
const ACCESS_LABELS = { admin: 'Администратор', user: 'Пользователь', guest: 'Гость' };
function accessBadge(a) { return `<span class="badge badge-${a}">${ACCESS_LABELS[a]||a}</span>`; }

function formatDate(d) {
    if (!d) return '—';
    const parts = d.split('-');
    if (parts.length === 3) return parts[2] + '.' + parts[1] + '.' + parts[0];
    return d;
}

async function loadUsers() {
    const users = await fetch('/api/users').then(r => r.json());
    const tbody = document.getElementById('users-body');
    tbody.innerHTML = users.length === 0
        ? '<tr><td colspan="7" style="text-align:center;color:#999;">Нет пользователей</td></tr>'
        : users.map((u, i) => `<tr>
            <td>${i+1}</td>
            <td>${u.full_name}</td>
            <td>${u.position}</td>
            <td>${u.department}</td>
            <td>${accessBadge(u.access_level)}</td>
            <td>${formatDate(u.password_changed)}</td>
            <td>
                <a href="users_edit.html?id=${u.id}" class="btn btn-warning btn-sm">Редактировать</a>
                <button class="btn btn-danger btn-sm" onclick="deleteUser(${u.id})">Удалить</button>
            </td>
        </tr>`).join('');
}

async function deleteUser(id) {
    if (!confirm('Вы уверены, что хотите удалить этого пользователя?')) return;
    const res = await fetch('/api/users/' + id, { method: 'DELETE' });
    if (res.ok) loadUsers();
    else alert('Ошибка при удалении.');
}

loadUsers();
</script>
</body>
</html>
